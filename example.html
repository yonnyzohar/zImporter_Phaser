<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>zImporter Phaser Scene Example</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    <!-- Load your compiled bundle -->
    <script src="./dist/zimporter-phaser.min.js"></script>
    <!-- Spine 4.x IIFE bundle for use in the browser -->
    <script src="./node_modules/@esotericsoftware/spine-phaser/dist/iife/spine-phaser.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script>

        // Example JSON path (adjust as needed)
        //

        let sceneJsonPath = "./assets/zStudioTest/";

        // Define a Phaser scene that will use ZScene
        class MyPhaserScene extends Phaser.Scene {

            preload() {
                // Optionally preload assets here
            }
            create() {
                zimporter.ZUpdatables.init(24);
                // FPS tracking
                this._frameCount = 0;
                this._lastTime = performance.now();
                this._fpsText = this.add.text(10, 10, 'FPS: --', {
                    fontSize: '16px',
                    fill: '#ffffff'
                }).setDepth(9999);

                // Instantiate ZScene and load the scene JSON
                this.zScene = new zimporter.ZScene('testScene', this);
                this.zScene.load(sceneJsonPath, () => {
                    // After loading, add objects to this Phaser scene
                    this.zScene.loadStage(this);

                    let stage = this.zScene.sceneStage;
                    for (const child of stage.list) {
                        if (child instanceof zimporter.ZTimeline) {
                            child.play();
                        }
                    }
                });
            }



            update(time, delta) {
                // FPS counter
                this._frameCount++;
                const now = performance.now();
                const elapsed = now - this._lastTime;
                if (elapsed >= 1000) {
                    const fps = (this._frameCount / elapsed) * 1000;
                    this._fpsText.setText(`FPS: ${fps.toFixed(1)}`);
                    this._fpsText.setDepth(9999); // Keep on top
                    this._frameCount = 0;
                    this._lastTime = now;
                }

                // delta is already in ms, same as PIXI's ticker.deltaMS
                const deltaMS = delta / 1000;
                zimporter.ZUpdatables.update();
            }
        }

        // Create Phaser game config
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            scene: [MyPhaserScene],
            backgroundColor: '#222',
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            plugins: {
                scene: [{
                    key: 'SpinePlugin',
                    plugin: spine.SpinePlugin,
                    mapping: 'spine'
                }]
            }
        };

        // Start Phaser game
        const game = new Phaser.Game(config);
        globalThis.__PHASER_GAME__ = game;

        // Handle window resize
        window.addEventListener('resize', () => {
            const scene = game.scene.getScene('testScene') || game.scene.scenes[0];
            if (scene && scene.zScene) {
                scene.zScene.resize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>

</html>
